schema: spec-driven

context: |
  Project: d2-autogen-forms

  What it is:
  - React-based DHIS2 application that generates customized data entry forms for datasets
  - Uses configuration stored in DHIS2 dataStore (namespace: d2-reports/autogenerated-forms)
    to control how datasets, sections, and data elements are rendered
  - Supports multiple view types: table, grid, grid-with-periods, grid-with-category-option-combos,
    disaggregated-category-option-combos, grid-with-totals, grid-with-subnational-ous,
    grid-indicators-calculated, matrix-grid
  - Includes a companion Autogen Configurator App for editing form configurations
  - Part of EyeSeeTea's DHIS2 Suite

  Tech stack:
  - React 17.0.2
  - TypeScript 4.5.2 (strict mode)
  - Material UI 4.12.3
  - DHIS2 UI components (@dhis2/ui 7.16.2)
  - @eyeseetea/d2-api 1.9.3 (DHIS2 API abstraction)
  - Monaco editor for JSON editing in configurator
  - Styled components 5.3.3
  - Testing: Jest 27 + @testing-library/react 12 + ts-mockito
  - E2e: Cypress
  - Build: react-scripts 4 (CRA)
  - i18n: @dhis2/d2-i18n (English, Spanish, French)

  Directory structure:
  - src/
    - domain/          # Business logic (Clean Architecture)
      - common/
        - entities/    # Domain models (DataForm, DataElement, Rule, Section, etc.)
        - repositories/ # Repository interfaces (ConfigRepository, DataFormRepository, etc.)
        - usecases/    # Use cases
      - autogenerated-forms-configurator/ # Configurator domain
    - data/            # Repository implementations
      - common/
        - clients/storage/ # DataStore abstraction (StorageClient, DataStoreStorageClient)
        - Dhis2ConfigRepository.ts
        - Dhis2DataFormRepository.ts
        - Dhis2DataValueRepository.ts
        - Dhis2OrgUnitsRepository.ts
        - RuleD2Repository.ts
      - autogenerated-forms-configurator/
    - webapp/          # React presentation layer
      - components/    # UI components
      - contexts/      # React contexts
      - hooks/         # Custom hooks
      - reports/       # Report components
      - utils/         # UI utilities
    - scripts/         # CLI scripts
    - locales/         # i18n translations
    - types/           # TypeScript type definitions
    - utils/           # Shared utilities

  Key domain concepts:
  - DataForm: represents a dataset's form configuration with sections, view types, rules
  - Section: a grouping of data elements with its own view type and display config
  - DataElement: an individual data entry field with rules, selections, toggles
  - Rule: conditional logic (show/hide, disable, clear, delete) based on data values
  - Toggle: section visibility controlled by data element values, org units, or JS expressions
  - ViewType: how a section is rendered (table, grid, grid-with-periods, etc.)
  - DataStore config: JSON stored in DHIS2 dataStore controlling all form behavior

  Architecture:
  - Clean Architecture
  - Layers: Presentation (webapp/) → Domain (domain/) → Data (data/)
  - Domain layer has no framework or DHIS2 dependencies
  - Data layer implements domain repository interfaces using @eyeseetea/d2-api
  - Repository pattern for all external data access (DHIS2 API, DataStore)
  - Dependencies wired via CompositionRoot
  - Dependency rule: outer layers depend on inner layers, never the reverse

  Git workflow (gitflow):
  - Feature branches start from `development` and merge back to `development`
  - If a feature depends on another unmerged feature, branch from that feature branch
    and merge back to the same branch (not development), making the dependency explicit
  - Branch naming:
    - New features: feature/<human-readable-name>
    - Bug fixes: fix/<human-readable-name>
  - Commits follow Conventional Commits (https://www.conventionalcommits.org/en/v1.0.0/):
    - feat: new feature
    - fix: bug fix
    - refactor: code change that neither fixes nor adds
    - test: adding or updating tests
    - docs: documentation changes
    - chore: maintenance tasks
    - Scope is encouraged: feat(grid-view): add period column support

  Canonical commands:
  - Dev: yarn start (localhost:8081, proxies to DHIS2 on :8080)
  - Build autogen forms: yarn build-autogenerated-forms
  - Build configurator: yarn build configurator
  - Test: yarn test
  - Lint: yarn lint
  - E2e: yarn cy:e2e:run
  - i18n: yarn update-po && yarn localize

  Non-goals (do NOT introduce these):
  - No server-side rendering
  - No database (all data comes from DHIS2 API / DataStore)
  - No standalone backend or Node.js server

  Extension principles:
  - New view types go in webapp/components/ with corresponding domain entities
  - New form configuration options go through DataStore config schema
  - Domain entities must remain framework-independent
  - New use cases go in src/domain/common/usecases/
  - New repository interfaces go in src/domain/common/repositories/

  Testing strategy:
  - Unit tests (Jest) for domain entities, use cases, and utility functions
  - Component tests (@testing-library/react) for React components
  - E2e tests (Cypress) for full user flows
  - Assert concrete expected values in tests, never just toBeDefined() or toBeTruthy()
  - Group tests with describe blocks by feature or scenario
  - Use helper functions to reduce test setup repetition

  Code style:
  - Prefer functional/declarative patterns over imperative loops with mutable state
  - Use flatMap, find, reduce, map, filter instead of for...of + push/break
  - Avoid mutating function arguments or shared state — return new objects/arrays
  - When a loop body is a pure transformation, express it as a functional operation
  - Apply immutability comprehensively at the file level, not just per-function; use Readonly<T> for data structures
  - Prefer composition over inheritance when structuring modules and behavior
  - When defining a union type that also needs runtime values, derive the type from a const array (as const + typeof arr[number]), never use unsafe 'as Type[]' casts

  ClickUp project structure:
  - Projects are stored under space "Projects" in ClickUp
  - Each project has 2 lists:
    - PM list: high-level project progress tracking
    - Team list: individual task progress tracking
  - Naming convention:
    - Folder: "Client - Project name"
    - Lists: "Client - Project name - PM" and "Client - Project name - team"

rules:
  project:
    - "Specs first: before modifying any behavior, check openspec/specs/ for existing specs. If behavior is unclear, read the spec. If no spec exists, propose one under changes/."
    - Follow code conventions: TypeScript strict, correct naming (camelCase/PascalCase/kebab-case).
    - "New code goes in the correct src/ subdirectory: domain logic in domain/, UI components in webapp/, repository implementations in data/, shared utilities in utils/."
    - "Clean Architecture: domain layer must have no framework or DHIS2 dependencies. All external access goes through repository interfaces defined in domain/repositories/."
    - "Git: always branch from `development` unless the feature depends on an unmerged branch, in which case branch from that branch and merge back to it. Use feature/<name> for features, fix/<name> for bugs. All commits must follow Conventional Commits."
    - "Definition of Done: a change is complete when specs are updated, code aligns with specs, tests pass, and no breaking surfaces are altered without a proposal."
    - "Boy Scout Rule: leave every file you touch cleaner than you found it. When modifying a file, fix any convention violations you encounter (imperative loops → functional, weak test assertions → concrete values, missing describe groups, mutable state → immutable). Keep scope to files already being changed."

  proposal:
    - Must include: Goals, Non-goals, User impact, Compatibility (DataStore config schema changes), and Rollback plan.
    - If changing DataStore configuration schema, explicitly list old vs new structure.

  design:
    - Must describe: data flow from DHIS2 API through repositories to use cases and components, form configuration logic, and rendering approach.
    - Note known constraints (DHIS2 API limitations, DataStore size limits) when relevant.

  tasks:
    - Include at least one task for tests (Jest/Cypress) when domain logic or UI behavior changes.
    - Include a task to update specs/ when behavior changes.
    - "Tag each task with the responsible agent role: [BE] or [FE] as applicable."

  specs:
    - "Tests are the behavioral source of truth: they validate and document expected behavior. Specs provide design context that tests cannot express (goals, non-goals, design decisions, considered alternatives, rationale)."
    - "Specs and tests are complementary: specs capture the 'why' and design intent, tests capture the 'what' and enforce correctness. When they diverge, fix both — do not block PRs on spec drift alone if tests pass."
    - Any change that affects DataStore configuration schema, view types, or rule behavior must come with delta specs under changes/<change-name>/specs/.
    - "Keep specs lean: avoid duplicating in markdown what is already asserted by well-named tests. Focus specs on information tests cannot convey (architecture decisions, trade-offs, user impact)."
    - "Minimize archive bloat: archived specs in changes/archive/ should be kept concise. Remove superseded content to avoid wasting AI context tokens on outdated material."
